version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: onepass
      POSTGRES_USER: onepass
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onepass"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://onepass:${DB_PASSWORD:-changeme}@db:5432/onepass
      API_KEY: ${API_KEY:-your-secret-api-key}
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
