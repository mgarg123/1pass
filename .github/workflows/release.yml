name: Release Builds

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: apk
          - os: macos-latest
            target: macos
          - os: windows-latest
            target: windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        if: matrix.target == 'apk'
        run: |
          flutter build apk --release
          cp build/app/outputs/flutter-apk/app-release.apk OnePass-Android.apk

      - name: Build macOS App
        if: matrix.target == 'macos'
        run: |
          flutter build macos --release
          cd build/macos/Build/Products/Release
          zip -r ../../../../../OnePass-macOS.zip one_pass.app

      - name: Build Windows App
        if: matrix.target == 'windows'
        run: |
          flutter build windows --release
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath OnePass-Windows.zip

      - name: Publish Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            OnePass-Android.apk
            OnePass-macOS.zip
            OnePass-Windows.zip
